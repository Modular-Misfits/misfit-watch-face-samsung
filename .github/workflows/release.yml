name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > misfit-release.jks

      - name: Copy Samsung Health AAR placeholder
        run: |
          mkdir -p app/libs
          # AAR is gitignored — CI uses a dummy if not in secrets
          if [ -n "${{ secrets.SAMSUNG_HEALTH_AAR_BASE64 }}" ]; then
            echo "${{ secrets.SAMSUNG_HEALTH_AAR_BASE64 }}" | base64 -d > app/libs/samsung-health-data-api-1.1.0.aar
          else
            echo "WARNING: Samsung Health AAR not provided — build may fail"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PATH: ../misfit-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || grep versionName app/build.gradle | head -1 | tr -d "'" | awk '{print $NF}')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ github.run_number }}
          name: Misfit Cyber Analog v${{ steps.version.outputs.name }} (build ${{ github.run_number }})
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
