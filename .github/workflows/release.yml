name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > misfit-release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PATH: ../misfit-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_ACTOR: Solutions78
          GITHUB_TOKEN: ${{ secrets.GPR_TOKEN }}
        run: ./gradlew assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || grep versionName app/build.gradle | head -1 | tr -d "'" | awk '{print $NF}')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ github.run_number }}
          name: Misfit Cyber Analog v${{ steps.version.outputs.name }} (build ${{ github.run_number }})
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
